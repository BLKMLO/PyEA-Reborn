# Configuration fonctionnelle de PyEA.
# Les secrets (identifiants, host/ports réels) vivent dans .env — jamais ici.

server:
  host: "127.0.0.1"
  port: 8000

broker:
  # Broker actif au démarrage : doit correspondre à une clé du registre de
  # gateways. Disponibles : "interactive_brokers", "metatrader5". On peut aussi
  # en changer à chaud depuis la fenêtre de connexion du dashboard (liste
  # déroulante) — ce choix runtime ne réécrit pas cette valeur.
  name: "interactive_brokers"
  # "paper" ou "live". Pour IB : le port TWS/Gateway correspondant est lu dans
  # .env (IB_PORT_PAPER / IB_PORT_LIVE) : passer en live = changer cette valeur.
  # Pour MetaTrader 5, démo/réel dépend du COMPTE connecté dans le terminal
  # (ce champ n'y change rien — il reste informatif).
  trading_mode: "paper"
  # MetaTrader 5 : chemin OPTIONNEL du terminal (sinon dans .env). Vide = auto.
  # mt5_terminal_path: ""

strategy:
  # Stratégie active : doit correspondre à une clé du registre de stratégies.
  name: "couleuvre_v0_1"
  # Kill-switch GLOBAL de la stratégie. Le trading par paire se pilote
  # depuis le dashboard (bouton Trading/Stopped, persisté en base) :
  # une paire ne trade que si ce flag ET son interrupteur sont actifs.
  enabled: false

ui:
  # Période de rafraîchissement du graphique actif du dashboard (secondes).
  chart_refresh_seconds: 5

risk:
  max_position_size: 1
  max_daily_loss_pct: 2.0
  max_open_positions: 1

history:
  # Données historiques M1 (Dukascopy) pour le backtest — voir
  # download_history.py. Année de départ réglable (2010 = défaut voulu).
  data_dir: "./data/history"
  start_year: 2010
  instruments:
    # Majeures
    - EURUSD
    - GBPUSD
    - USDJPY
    - USDCHF
    - USDCAD
    - AUDUSD
    - NZDUSD
    # Croisées EUR
    - EURGBP
    - EURJPY
    - EURCHF
    - EURAUD
    - EURCAD
    - EURNZD
    # Croisées GBP
    - GBPJPY
    - GBPCHF
    - GBPAUD
    - GBPCAD
    - GBPNZD
    # Autres croisées
    - AUDJPY
    - AUDCHF
    - AUDCAD
    - AUDNZD
    - NZDJPY
    - NZDCHF
    - NZDCAD
    - CADJPY
    - CADCHF
    - CHFJPY
    # Métaux & indices
    - XAUUSD
    - XAGUSD
    - US500

storage:
  # URL SQLAlchemy — remplacer par postgresql+psycopg://... pour migrer.
  database_url: "sqlite:///./data/pyea.db"
  # Artefacts d'entraînement (metadata.json, modèles LightGBM à venir) :
  # un sous-dossier par run — data/models/<strategie>-<horodatage>/.
  models_dir: "./data/models"

logging:
  level: "INFO"
  file: "./logs/pyea.log"
  # Nombre de lignes de log conservées en mémoire pour l'interface web.
  web_buffer_size: 500
