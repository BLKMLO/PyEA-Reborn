<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PyEA{% endblock %}</title>
  <!-- Tailwind : style uniquement (mise en page, couleurs, espacements). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTMX : interactions REST sans build front. -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-900 text-slate-100">
  <header class="border-b border-slate-700 bg-slate-800 px-6 py-4">
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-semibold tracking-wide">🐍 PyEA</h1>
      <span id="ws-status" class="text-sm text-slate-400">WebSocket : déconnecté</span>
    </div>
  </header>
  <main class="mx-auto max-w-6xl p-6">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
